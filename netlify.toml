[build]
  command = "pnpm exec playwright install chromium && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Ensure Chromium is available for post-build prerender on Netlify
  PLAYWRIGHT_BROWSERS_PATH = "0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Static files (robots.txt, sitemap.xml, icons, assets) are served first by Netlify

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Baseline CSP — allow app, Cloudinary assets, and landing embeds (YouTube/Instagram).
    # Tighten further once analytics domains are finalized.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https://res.cloudinary.com https://*.ytimg.com https://*.instagram.com https://www.googletagmanager.com; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.clarity.ms https://*.posthog.com; connect-src 'self' https: wss:; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://www.instagram.com https://www.googletagmanager.com; worker-src 'self' blob:;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
